<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport" />
    <title>Offline | lifting3</title>
    <meta
      content="lifting3 needs a connection to load workout data, but the app shell is installed and ready when you're back online."
      name="description"
    />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          "IBM Plex Sans",
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(249, 115, 22, 0.22), transparent 28%),
          radial-gradient(circle at top right, rgba(250, 204, 21, 0.14), transparent 24%), #111317;
        color: #f7f7f8;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.5rem;
        background: rgba(17, 19, 23, 0.88);
        padding: 1.5rem;
        box-shadow: 0 24px 56px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(18px);
      }

      img {
        display: block;
        width: 3rem;
        height: 3rem;
        margin-bottom: 1rem;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        line-height: 1.2;
      }

      p {
        margin: 0.75rem 0 0;
        color: rgba(247, 247, 248, 0.75);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img alt="" height="48" src="/icon-192.png" width="48" />
      <h1>You’re offline</h1>
      <p>
        lifting3 can still launch from your device, but workout data needs a connection. Reconnect
        and reload to get back to your training history and coaching tools.
      </p>
    </main>
  </body>
</html>
